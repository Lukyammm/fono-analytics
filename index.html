<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<base target="_top">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
/* ========================= TOKENS ========================= */
:root{
  --page:#f6f6f3; --surface:#ffffff; --surface-2:#f1f1ed;
  --ink:#191a17; --ink-2:#52514e; --muted:#898781;
  --line:#e4e3dc; --line-soft:#eeede7;
  --accent:#0e5f6a; --accent-hover:#0b4c55; --accent-soft:#e3eff0; --accent-ink:#eaf4f5;
  --side:#141b1d; --side-ink:#b9c6c8; --side-ink-strong:#ffffff;
  --ok:#0ca30c; --ok-text:#006300; --warn:#a86a00; --warn-bg:#fdf3df;
  --bad:#d03b3b; --bad-bg:#fbe9e9; --ok-bg:#e5f4e5;
  /* série de dados (paleta validada) */
  --s1:#2a78d6; --s1-soft:#cde2fb; --s2:#1baf7a; --s3:#eda100; --s4:#008300;
  --r:12px; --r-sm:8px;
  --shadow:0 1px 2px rgba(25,26,23,.05),0 10px 28px -18px rgba(25,26,23,.22);
}
*{box-sizing:border-box}
html,body{margin:0;height:100%}
body{font-family:"Inter",system-ui,sans-serif;background:var(--page);color:var(--ink);font-size:14px;line-height:1.5;
  font-feature-settings:"cv05","cv11"}
button{font-family:inherit;cursor:pointer}
input,select,textarea{font-family:inherit;font-size:14px;color:var(--ink)}
a{color:var(--accent)}
.hidden{display:none!important}
.num{font-variant-numeric:tabular-nums}
::placeholder{color:#a7a59e}

/* ========================= LOGIN ========================= */
.auth{min-height:100vh;display:grid;place-items:center;padding:24px;
  background:linear-gradient(160deg,#f6f6f3 55%,#e7eeee)}
.auth-card{width:100%;max-width:392px;background:var(--surface);border:1px solid var(--line);
  border-radius:16px;box-shadow:var(--shadow);padding:36px 32px}
.brand{display:flex;align-items:center;gap:11px}
.brand .mark{width:36px;height:36px;border-radius:10px;background:var(--accent);color:#fff;flex:none;
  display:grid;place-items:center;font-weight:800;font-size:16px;letter-spacing:-.5px}
.brand .t b{display:block;font-size:17px;font-weight:700;letter-spacing:-.2px}
.brand .t span{display:block;font-size:12px;color:var(--muted);margin-top:1px}
.auth-card .brand{margin-bottom:26px}
.field{margin-bottom:14px}
.field label{display:block;font-size:11.5px;font-weight:600;color:var(--ink-2);margin-bottom:5px;
  text-transform:uppercase;letter-spacing:.5px}
.field input,.field select,.field textarea{width:100%;padding:9px 12px;border:1px solid var(--line);
  border-radius:var(--r-sm);background:var(--surface);outline:none;transition:border-color .15s,box-shadow .15s}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}
.field textarea{resize:vertical;min-height:64px}
.field .hint{font-size:12px;color:var(--muted);margin-top:4px}
.btn{border:1px solid transparent;border-radius:var(--r-sm);padding:9px 15px;font-weight:600;font-size:13.5px;
  background:var(--accent);color:#fff;transition:background .15s;display:inline-flex;align-items:center;gap:7px;justify-content:center}
.btn:hover{background:var(--accent-hover)}
.btn:disabled{opacity:.5;cursor:default}
.btn.block{width:100%;padding:11px}
.btn.ghost{background:var(--surface);color:var(--ink);border-color:var(--line)}
.btn.ghost:hover{background:var(--surface-2)}
.btn.danger{background:#fff;color:var(--bad);border-color:var(--line)}
.btn.danger:hover{background:var(--bad-bg)}
.btn.sm{padding:6px 11px;font-size:12.5px}
.btn.xs{padding:3px 8px;font-size:12px;font-weight:500}
.err{color:var(--bad);font-size:13px;margin-top:10px;min-height:18px}
.note{font-size:12px;color:var(--muted);margin-top:18px;text-align:center}

/* ========================= SHELL ========================= */
.app{display:grid;grid-template-columns:236px 1fr;min-height:100vh}
.side{background:var(--side);color:var(--side-ink);display:flex;flex-direction:column;
  position:sticky;top:0;height:100vh;padding:20px 12px 14px;overflow-y:auto}
.side .brand{padding:0 10px;margin-bottom:26px}
.side .brand .t b{color:#fff}
.side .brand .t span{color:#7f9296}
.nav{display:flex;flex-direction:column;gap:2px}
.nav .sect{font-size:10.5px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:#5f7276;
  padding:16px 12px 6px}
.nav button{display:flex;align-items:center;gap:11px;width:100%;text-align:left;background:transparent;
  border:none;color:var(--side-ink);padding:9px 12px;border-radius:8px;font-weight:500;font-size:13.5px}
.nav button svg{width:17px;height:17px;flex:none;opacity:.8}
.nav button:hover{background:#ffffff10;color:#fff}
.nav button.active{background:#ffffff1c;color:#fff;font-weight:600}
.nav button.active svg{opacity:1}
.side .spacer{flex:1}
.side .who{padding:12px;border-top:1px solid #ffffff1a;margin-top:12px;display:flex;align-items:center;gap:10px}
.side .who .av{width:32px;height:32px;border-radius:50%;background:#28545c;color:#cfe6e9;display:grid;place-items:center;
  font-weight:700;font-size:13px;flex:none}
.side .who .nm{font-weight:600;color:#fff;font-size:13px;line-height:1.2}
.side .who .rl{color:#7f9296;font-size:11px;text-transform:uppercase;letter-spacing:.5px}
.side .who button{margin-left:auto;background:none;border:none;color:#7f9296;padding:6px;border-radius:6px}
.side .who button:hover{background:#ffffff14;color:#fff}

.main{padding:26px 30px 70px;max-width:1240px;width:100%;margin:0 auto}
.topbar{display:flex;align-items:flex-end;justify-content:space-between;gap:14px;margin-bottom:22px;flex-wrap:wrap}
.topbar h2{font-weight:700;font-size:21px;margin:0;letter-spacing:-.3px}
.topbar .sub{color:var(--muted);font-size:13px;margin-top:2px}
.topbar .tools{display:flex;gap:9px;align-items:center;flex-wrap:wrap}
.sel,.search{padding:8px 11px;border:1px solid var(--line);border-radius:var(--r-sm);background:#fff;outline:none}
.sel:focus,.search:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}
.search{min-width:210px}
input[type=date].sel{padding:7px 10px}

.card{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow)}
.panel{padding:18px 20px}
.panel h3{margin:0 0 14px;font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--ink-2)}
.grid{display:grid;gap:14px}
.two{grid-template-columns:1fr 1fr}
.three{grid-template-columns:1fr 1fr 1fr}
@media(max-width:960px){.two,.three{grid-template-columns:1fr}.app{grid-template-columns:64px 1fr}
  .side .brand .t,.nav .sect,.nav button span,.side .who .t2,.side .who button{display:none}
  .nav button{justify-content:center;padding:11px}.side .who{justify-content:center}.main{padding:20px 16px 60px}}

/* KPIs */
.kpis{grid-template-columns:repeat(auto-fill,minmax(172px,1fr))}
.kpi{padding:15px 17px}
.kpi .lab{font-size:11.5px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;font-weight:600}
.kpi .val{font-weight:700;font-size:28px;margin-top:5px;line-height:1.1;letter-spacing:-.5px}
.kpi .val small{font-size:14px;color:var(--muted);font-weight:500}
.kpi .sub{font-size:12px;color:var(--muted);margin-top:4px}
.kpi .sub b.up{color:var(--ok-text)}
.kpi.hero{background:var(--accent);border-color:var(--accent)}
.kpi.hero .lab,.kpi.hero .sub{color:#bcd8db}
.kpi.hero .val{color:#fff}

/* barras horizontais */
.bars{display:flex;flex-direction:column;gap:8px}
.bar-row{display:grid;grid-template-columns:minmax(120px,42%) 1fr 44px;align-items:center;gap:10px;font-size:12.5px}
.bar-row .lbl{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--ink-2)}
.bar-row .num{text-align:right;font-weight:600}
.bar{height:14px;border-radius:0 4px 4px 0;background:var(--surface-2);overflow:hidden}
.bar>span{display:block;height:100%;background:var(--s1);border-radius:0 4px 4px 0;min-width:2px}
.bar.alt>span{background:var(--s2)}

/* colunas (série diária) */
.cols{display:flex;align-items:flex-end;gap:2px;height:130px;padding-top:8px}
.cols .c{flex:1;background:var(--s1);border-radius:4px 4px 0 0;min-height:2px;position:relative;cursor:default}
.cols .c:hover{background:var(--accent)}
.chart-x{display:flex;justify-content:space-between;font-size:11px;color:var(--muted);margin-top:6px}
.tip{position:fixed;background:var(--ink);color:#fff;font-size:12px;padding:5px 9px;border-radius:6px;
  pointer-events:none;z-index:99;transform:translate(-50%,-130%);white-space:nowrap;display:none}

/* tabelas */
table{width:100%;border-collapse:collapse}
th,td{text-align:left;padding:10px 12px;border-bottom:1px solid var(--line-soft);font-size:13px;vertical-align:middle}
th{font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);font-weight:600;
  background:var(--surface-2);position:sticky;top:0;z-index:1}
tr:last-child td{border-bottom:none}
td.r,th.r{text-align:right}
.tbl-wrap{overflow:auto;border-radius:var(--r)}
.tbl-wrap.max{max-height:560px}
.rowlink{cursor:pointer}
.rowlink:hover td{background:#f4f8f8}
.empty{padding:44px 20px;text-align:center;color:var(--muted)}
.empty b{display:block;color:var(--ink);margin-bottom:3px;font-size:14px}

/* pills e tags */
.pill{display:inline-block;padding:2px 9px;border-radius:999px;font-size:11.5px;font-weight:600;white-space:nowrap}
.pill.p1,.pill.p2{background:var(--bad-bg);color:#8f2b2b}
.pill.p3,.pill.p4,.pill.p5{background:var(--warn-bg);color:var(--warn)}
.pill.pn{background:var(--surface-2);color:var(--ink-2)}
.pill.ok{background:var(--ok-bg);color:var(--ok-text)}
.pill.warn{background:var(--warn-bg);color:var(--warn)}
.pill.bad{background:var(--bad-bg);color:#8f2b2b}
.pill.info{background:var(--accent-soft);color:var(--accent)}
.tag{display:inline-block;background:var(--surface-2);border:1px solid var(--line);border-radius:6px;
  padding:1px 7px;font-size:11.5px;color:var(--ink-2);margin:1px 2px 1px 0}

/* tabs */
.tabs{display:flex;gap:2px;border-bottom:1px solid var(--line);margin-bottom:16px;flex-wrap:wrap}
.tabs button{background:none;border:none;padding:9px 14px;font-size:13.5px;font-weight:500;color:var(--ink-2);
  border-bottom:2px solid transparent;margin-bottom:-1px}
.tabs button:hover{color:var(--ink)}
.tabs button.active{color:var(--accent);border-bottom-color:var(--accent);font-weight:600}

/* modal / drawer */
.overlay{position:fixed;inset:0;background:#191a1766;display:grid;place-items:center;padding:20px;z-index:40;
  backdrop-filter:blur(2px)}
.modal{width:100%;max-width:600px;max-height:92vh;overflow:auto;background:#fff;border-radius:14px;box-shadow:var(--shadow)}
.modal.wide{max-width:760px}
.modal-h{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--line);
  position:sticky;top:0;background:#fff;z-index:2}
.modal-h h3{margin:0;font-size:16px;font-weight:700;letter-spacing:-.2px}
.modal-h .x{background:none;border:none;font-size:20px;color:var(--muted);padding:4px 8px;border-radius:6px;line-height:1}
.modal-h .x:hover{background:var(--surface-2);color:var(--ink)}
.modal-b{padding:20px}
.modal-f{padding:14px 20px;border-top:1px solid var(--line);display:flex;justify-content:flex-end;gap:9px;
  position:sticky;bottom:0;background:#fff}
.frm{display:grid;grid-template-columns:1fr 1fr;gap:12px 14px}
.frm .full{grid-column:1/-1}
@media(max-width:640px){.frm{grid-template-columns:1fr}}
.fset{grid-column:1/-1;border-top:1px solid var(--line-soft);padding-top:12px;margin-top:4px;
  font-size:11.5px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--muted)}

/* chips (multi-select de procedimentos) */
.chips{display:flex;flex-wrap:wrap;gap:6px}
.chips label{display:inline-flex;align-items:center;gap:6px;border:1px solid var(--line);border-radius:999px;
  padding:5px 12px;font-size:12.5px;cursor:pointer;user-select:none;background:#fff;transition:all .12s}
.chips label:hover{border-color:var(--accent)}
.chips input{display:none}
.chips label.on{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:600}

/* timeline de atendimentos */
.tl{display:flex;flex-direction:column}
.tl-item{display:grid;grid-template-columns:96px 1fr auto;gap:12px;padding:11px 0;border-bottom:1px solid var(--line-soft);align-items:start}
.tl-item:last-child{border-bottom:none}
.tl-item .d{font-weight:600;font-size:13px}
.tl-item .d small{display:block;color:var(--muted);font-weight:500}
.tl-item .obs{font-size:12.5px;color:var(--ink-2);margin-top:3px}

/* consolidado (matriz com heat) */
.matrix td.heat{text-align:right;font-variant-numeric:tabular-nums}
.matrix th.rot{width:34%}
.matrix th,.matrix td{white-space:nowrap}
.matrix td.rot{white-space:normal;min-width:180px}
.matrix td.tot,.matrix th.tot{text-align:right;font-weight:700;background:var(--surface-2)}
.matrix tr.foot td{font-weight:700;background:var(--surface-2);border-top:2px solid var(--line)}
.matrix .rot{max-width:340px}

/* config: listas */
.cfg-list{display:flex;flex-direction:column}
.cfg-item{display:flex;align-items:center;gap:10px;padding:8px 4px;border-bottom:1px solid var(--line-soft);font-size:13px}
.cfg-item:last-child{border-bottom:none}
.cfg-item .v{flex:1}
.cfg-item.off .v{color:var(--muted);text-decoration:line-through}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;
  padding:10px 18px;border-radius:9px;font-size:13.5px;z-index:60;box-shadow:var(--shadow);opacity:0;
  transition:opacity .2s;pointer-events:none}
.toast.show{opacity:1}
.loading{display:grid;place-items:center;padding:60px;color:var(--muted)}
.spin{width:22px;height:22px;border:2.5px solid var(--line);border-top-color:var(--accent);border-radius:50%;
  animation:sp .7s linear infinite;margin:0 auto 10px}
@keyframes sp{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div id="root"></div>
<div class="tip" id="tip"></div>
<div class="toast" id="toast"></div>

<script>
/* ========================= ESTADO / RPC ========================= */
const S = { token:null, user:null, dados:null, view:'dashboard' };

function gs(fn){
  const args = Array.prototype.slice.call(arguments,1);
  return new Promise(function(res,rej){
    const runner = google.script.run
      .withSuccessHandler(res)
      .withFailureHandler(function(e){
        const msg = String((e&&e.message)||e);
        if (msg.indexOf('SESSAO_EXPIRADA')>=0){ toast('Sessão expirada. Entre novamente.'); doLogout(true); }
        else if (msg.indexOf('SEM_PERMISSAO')>=0){ toast('Sem permissão para esta ação.'); }
        else toast('Erro: '+msg);
        rej(e);
      });
    runner[fn].apply(runner,args);
  });
}

const $ = function(s,el){ return (el||document).querySelector(s); };
const $$ = function(s,el){ return Array.prototype.slice.call((el||document).querySelectorAll(s)); };
function esc(s){ return String(s==null?'':s).replace(/[&<>"']/g,function(c){
  return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]; }); }
function fmtD(d){ if(!d) return '—'; const s=String(d).slice(0,10).split('-'); return s.length===3?s[2]+'/'+s[1]+'/'+s[0]:esc(d); }
function hoje(){ const d=new Date(),p=function(n){return (n<10?'0':'')+n;}; return d.getFullYear()+'-'+p(d.getMonth()+1)+'-'+p(d.getDate()); }
function inicioMes(){ return hoje().slice(0,8)+'01'; }
function toast(m){ const t=$('#toast'); t.textContent=m; t.classList.add('show'); clearTimeout(t._h); t._h=setTimeout(function(){t.classList.remove('show');},2800); }

/* dados de referência */
function cfg(k){ return (S.dados&&S.dados.config&&S.dados.config[k])||''; }
function servicos(){ return (S.dados.servicos||[]).filter(function(s){return truthy(s.ativo);}); }
function servico(id){ return (S.dados.servicos||[]).filter(function(s){return Number(s.id)===Number(id);})[0]||null; }
function setores(servicoId){ return (S.dados.setores||[]).filter(function(s){
  return truthy(s.ativo)&&(!servicoId||Number(s.servicoId)===Number(servicoId)); }); }
function setor(id){ return (S.dados.setores||[]).filter(function(s){return Number(s.id)===Number(id);})[0]||null; }
function lista(cat,tipo){ return (S.dados.listas||[]).filter(function(l){
  return l.categoria===cat&&truthy(l.ativo)&&(!l.tipoServico||!tipo||l.tipoServico===tipo);
}).map(function(l){return l.valor;}); }
function truthy(v){ return v===true||String(v).toUpperCase()==='TRUE'; }
function isGestor(){ return S.user&&(S.user.perfil==='ADMIN'||S.user.perfil==='COORDENACAO'); }
function opts(arr,sel){ return '<option value="">—</option>'+arr.map(function(v){
  return '<option '+(v===sel?'selected':'')+' value="'+esc(v)+'">'+esc(v)+'</option>'; }).join(''); }
function prioClass(p){ const m=String(p||'').match(/(\d+)/); if(!m) return 'pn'; const n=Number(m[1]);
  return n<=2?'p1':(n<=5?'p3':'pn'); }
function prioCurta(p){ const m=String(p||'').match(/PRIORIDADE\s*(\d+)/i); return m?'P'+m[1]:(p?String(p).slice(0,18):'—'); }

/* ========================= LOGIN ========================= */
function renderLogin(msg){
  document.getElementById('root').innerHTML =
  '<div class="auth"><div class="auth-card">'+
    '<div class="brand"><div class="mark">Fa</div><div class="t"><b>Fono Analytics</b>'+
    '<span>Gestão de Fonoaudiologia Hospitalar</span></div></div>'+
    '<div class="field"><label>Usuário</label><input id="lg-user" autocomplete="username"></div>'+
    '<div class="field"><label>Senha</label><input id="lg-pass" type="password" autocomplete="current-password"></div>'+
    '<button class="btn block" id="lg-btn">Entrar</button>'+
    '<div class="err" id="lg-err">'+esc(msg||'')+'</div>'+
    '<div class="note">Acesso restrito à equipe autorizada.</div>'+
  '</div></div>';
  $('#lg-pass').addEventListener('keydown',function(e){ if(e.key==='Enter') doLogin(); });
  $('#lg-btn').addEventListener('click',doLogin);
  $('#lg-user').focus();
}

function doLogin(){
  const b=$('#lg-btn'); b.disabled=true; b.textContent='Entrando…';
  gs('login',$('#lg-user').value,$('#lg-pass').value).then(function(r){
    if(!r.ok){ $('#lg-err').textContent=r.erro; b.disabled=false; b.textContent='Entrar'; return; }
    S.token=r.token; S.user=r.user;
    try{ sessionStorage.setItem('fa_token',r.token); }catch(e){}
    if(r.primeiroAcesso){ renderTrocaSenha(); return; }
    boot();
  }).catch(function(){ b.disabled=false; b.textContent='Entrar'; });
}

function renderTrocaSenha(){
  document.getElementById('root').innerHTML =
  '<div class="auth"><div class="auth-card">'+
    '<div class="brand"><div class="mark">Fa</div><div class="t"><b>Definir nova senha</b>'+
    '<span>Primeiro acesso — escolha uma senha pessoal</span></div></div>'+
    '<div class="field"><label>Nova senha</label><input id="ts-1" type="password"><div class="hint">Mínimo de 6 caracteres.</div></div>'+
    '<div class="field"><label>Repita a senha</label><input id="ts-2" type="password"></div>'+
    '<button class="btn block" id="ts-btn">Salvar e entrar</button>'+
    '<div class="err" id="ts-err"></div>'+
  '</div></div>';
  $('#ts-btn').addEventListener('click',function(){
    const a=$('#ts-1').value,b=$('#ts-2').value;
    if(a!==b){ $('#ts-err').textContent='As senhas não conferem.'; return; }
    gs('trocarSenha',S.token,a).then(function(r){
      if(!r.ok){ $('#ts-err').textContent=r.erro; return; }
      boot();
    });
  });
}

function doLogout(silent){
  if(S.token&&!silent) gs('logout',S.token);
  S.token=null; S.user=null; S.dados=null;
  try{ sessionStorage.removeItem('fa_token'); }catch(e){}
  renderLogin();
}

/* ========================= SHELL ========================= */
const ICONS = {

function go(v){

    reunioes:vReunioes,consolidado:vConsolidado,config:vConfig};

}

function openModal(html,wide){
  closeModal();
  const o=document.createElement('div'); o.className='overlay'; o.id='ovl';
  o.innerHTML='<div class="modal'+(wide?' wide':'')+'">'+html+'</div>';
  o.addEventListener('mousedown',function(e){ if(e.target===o) closeModal(); });
  document.body.appendChild(o);
  const x=$('.modal-h .x',o); if(x) x.addEventListener('click',closeModal);
}
function closeModal(){ const o=$('#ovl'); if(o) o.remove(); }
function mHead(t){ return '<div class="modal-h"><h3>'+esc(t)+'</h3><button class="x">✕</button></div>'; }

function chips(name,valores,marcados){
  marcados=marcados||[];
  return '<div class="chips" data-chips="'+esc(name)+'">'+valores.map(function(v){
    const on=marcados.indexOf(v)>=0;
    return '<label class="'+(on?'on':'')+'"><input type="checkbox" value="'+esc(v)+'" '+(on?'checked':'')+'>'+esc(v)+'</label>';
  }).join('')+'</div>';
}
function bindChips(el){

function chipsVal(name,el){
  return $$('.chips[data-chips="'+name+'"] input',el).filter(function(i){return i.checked;})
    .map(function(i){return i.value;});
}

        Object.keys(k.foisDist).map(function(n){return {nome:'Nível '+n,total:k.foisDist[n]};}),false)+'</div>'+

      '<div class="card panel"><h3>Produção por profissional</h3>'+hbars(k.procPorProf,true)+'</div>'+
      '<div class="card panel" style="grid-column:1/-1"><h3>Procedimentos mais realizados</h3>'+hbars(k.procPorTipo)+'</div>'+

function kpi(lab,val,sub,cls){
  return '<div class="card kpi '+(cls||'')+'"><div class="lab">'+lab+'</div>'+
    '<div class="val num">'+val+'</div><div class="sub">'+sub+'</div></div>';
}

function hbars(arr,alt){
  if(!arr||!arr.length||!arr.some(function(a){return a.total>0;}))
    return '<div class="empty">Sem dados no período.</div>';
  const max=Math.max.apply(null,arr.map(function(a){return a.total;}));
  return '<div class="bars">'+arr.map(function(a){
    const w=max?Math.round(a.total/max*100):0;
    return '<div class="bar-row"><div class="lbl" title="'+esc(a.nome)+'">'+esc(a.nome)+'</div>'+
      '<div class="bar'+(alt?' alt':'')+'"><span style="width:'+w+'%"></span></div>'+
      '<div class="num">'+a.total+'</div></div>';
  }).join('')+'</div>';
}

function colChart(serie){
  if(!serie||!serie.length) return '<div class="empty">Sem dados no período.</div>';
  const max=Math.max.apply(null,serie.map(function(s){return s.total;}));
  return '<div class="cols">'+serie.map(function(s){
    const h=max?Math.max(2,Math.round(s.total/max*100)):2;
    return '<div class="c" style="height:'+h+'%" data-tip="'+fmtD(s.dia)+' · '+s.total+' procedimento'+(s.total===1?'':'s')+'"></div>';
  }).join('')+'</div>'+
  '<div class="chart-x"><span>'+fmtD(serie[0].dia)+'</span><span>'+fmtD(serie[serie.length-1].dia)+'</span></div>';
}
function bindColTips(){
  const tip=$('#tip');
  $$('[data-tip]').forEach(function(el){
    el.addEventListener('mousemove',function(e){
      tip.style.display='block'; tip.textContent=el.dataset.tip;
      tip.style.left=e.clientX+'px'; tip.style.top=e.clientY+'px';
    });
    el.addEventListener('mouseleave',function(){ tip.style.display='none'; });
  });
}

/* ---------- admissão ---------- */
function modalAdmissao(){
  const svs=servicos();
  openModal(mHead('Admitir paciente')+
  '<div class="modal-b">'+
    '<div class="field"><label>Paciente</label>'+
      '<input id="ad-busca" placeholder="Digite para buscar por nome ou prontuário…">'+
      '<div id="ad-res" style="margin-top:6px"></div>'+
      '<input type="hidden" id="ad-pid">'+
      '<div class="hint">Não achou? <a href="#" id="ad-novo">Cadastrar novo paciente</a></div></div>'+
    '<div class="frm">'+
      '<div class="field"><label>Serviço</label><select id="ad-serv">'+
        svs.map(function(s){return '<option value="'+s.id+'">'+esc(s.nome)+'</option>';}).join('')+'</select></div>'+
      '<div class="field"><label>Setor</label><select id="ad-setor"></select></div>'+
      '<div class="field"><label>Leito</label><input id="ad-leito"></div>'+
      '<div class="field"><label>Data de admissão</label><input type="date" id="ad-data" value="'+hoje()+'"></div>'+
    '</div>'+
    '<div id="ad-clinico"></div>'+
  '</div>'+
  '<div class="modal-f"><button class="btn ghost" onclick="closeModal()">Cancelar</button>'+
  '<button class="btn" id="ad-save">Admitir</button></div>',true);

  function tipoSel(){ const sv=servico($('#ad-serv').value); return sv?sv.tipo:'ADULTO'; }
  function refresh(){
    const sid=$('#ad-serv').value;
    $('#ad-setor').innerHTML=setores(sid).map(function(s){
      return '<option value="'+s.id+'">'+esc(s.nome)+'</option>';}).join('');
    $('#ad-clinico').innerHTML=formClinico(tipoSel(),{});
  }
  $('#ad-serv').addEventListener('change',refresh); refresh();

  let t; $('#ad-busca').addEventListener('input',function(){
    clearTimeout(t); const v=this.value;
    if(v.length<2){ $('#ad-res').innerHTML=''; return; }
    t=setTimeout(function(){
      gs('listPacientes',S.token,v).then(function(r){
        $('#ad-res').innerHTML=r.pacientes.slice(0,6).map(function(p){
          return '<button class="btn ghost sm" style="margin:2px" data-id="'+p.id+'" data-n="'+esc(p.nome)+'">'+
            esc(p.nome)+' <span class="tag">'+esc(p.prontuario)+'</span></button>';
        }).join('')||'<span class="hint">Nenhum paciente encontrado.</span>';
        $$('#ad-res button').forEach(function(b){
          b.addEventListener('click',function(){
            $('#ad-pid').value=b.dataset.id;
            $('#ad-busca').value=b.dataset.n;
            $('#ad-res').innerHTML='<span class="pill ok">selecionado</span>';
          });
        });
      });
    },350);
  });
  $('#ad-novo').addEventListener('click',function(e){
    e.preventDefault();
    modalPaciente(null,function(id,nome){
      modalAdmissao();
      $('#ad-pid').value=id; $('#ad-busca').value=nome;
      $('#ad-res').innerHTML='<span class="pill ok">selecionado</span>';
    });
  });
  $('#ad-save').addEventListener('click',function(){
    const pid=$('#ad-pid').value;
    if(!pid){ toast('Selecione ou cadastre o paciente.'); return; }
    const obj=coletaClinico();
    obj.pacienteId=Number(pid); obj.servicoId=Number($('#ad-serv').value);
    obj.setorId=Number($('#ad-setor').value); obj.leito=$('#ad-leito').value;
    obj.dataAdmissao=$('#ad-data').value;
    this.disabled=true;
    gs('saveEpisodio',S.token,obj).then(function(r){
      if(r.ok){ toast('Paciente admitido.'); closeModal(); loadCenso(); }
    });
  });
}

/* campos clínicos por tipo de serviço */
function formClinico(tipo,e){
  const F=function(lab,inner){ return '<div class="field"><label>'+lab+'</label>'+inner+'</div>'; };
  let h='<div class="frm"><div class="fset">Avaliação clínica</div>';
  h+=F('Solicitação','<select id="fc-solicitacao">'+opts(lista('SOLICITACAO',tipo),e.solicitacao)+'</select>');
  h+=F('Prioridade','<select id="fc-prioridade">'+opts(lista('PRIORIDADE',tipo),e.prioridade)+'</select>');
  h+='<div class="field full"><label>Hipótese diagnóstica</label><input id="fc-hipotese" value="'+esc(e.hipoteseDiagnostica||'')+'"></div>';
  if(tipo==='INFANTIL'){
    h+=F('Idade gestacional','<input id="fc-ig" value="'+esc(e.idadeGestacional||'')+'" placeholder="ex.: 32 sem">');
    h+=F('Utensílio utilizado','<select id="fc-utensilio">'+opts(lista('UTENSILIO',tipo),e.utensilio)+'</select>');
  }else{
    h+=F('Idade (anos)','<input id="fc-idade" type="number" min="0" value="'+esc(e.idade||'')+'">');
    h+=F('FOIS na admissão','<select id="fc-foisAdm">'+opts(lista('FOIS',tipo),e.foisAdmissao)+'</select>');
  }
  h+=F('Dieta da admissão','<select id="fc-dietaAdm">'+opts(lista('DIETA_ADMISSAO',tipo),e.dietaAdmissao)+'</select>');
  h+='<div class="fset">Desmame de via alternativa (VAA)</div>';
  h+=F('Início da transição','<input type="date" id="fc-vaaIni" value="'+esc(String(e.vaaInicio||'').slice(0,10))+'">');
  h+=F('Conclusão','<input type="date" id="fc-vaaFim" value="'+esc(String(e.vaaConclusao||'').slice(0,10))+'">');
  h+='<div class="field full"><label>Justificativa da conclusão ou não</label><select id="fc-vaaJust">'+
     opts(lista('JUSTIFICATIVA_DESMAME',tipo),e.vaaJustificativa)+'</select></div>';
  if(tipo!=='INFANTIL'){
    h+='<div class="fset">Decanulação</div>';
    h+=F('Em protocolo?','<select id="fc-decProt">'+opts(lista('DECANULACAO',tipo),e.decanulacaoProtocolo)+'</select>');
    h+=F('Avaliação p/ desinsuflar cuff','<input type="date" id="fc-decAval" value="'+esc(String(e.decanulacaoAvaliacao||'').slice(0,10))+'">');
    h+=F('Data da decanulação','<input type="date" id="fc-decData" value="'+esc(String(e.decanulacaoData||'').slice(0,10))+'">');
  }
  if(tipo==='AMBULATORIO'){
    h+=F('Alta fonoaudiológica?','<select id="fc-altaFono">'+opts(['SIM','NÃO'],e.altaFono)+'</select>');
  }
  h+='<div class="field full"><label>Observações</label><textarea id="fc-obs">'+esc(e.obs||'')+'</textarea></div>';
  return h+'</div>';
}
function coletaClinico(){
  const g=function(id){ const el=$(id); return el?el.value:undefined; };
  return {
    solicitacao:g('#fc-solicitacao'), prioridade:g('#fc-prioridade'),
    hipoteseDiagnostica:g('#fc-hipotese'), idade:g('#fc-idade'),
    idadeGestacional:g('#fc-ig'), utensilio:g('#fc-utensilio'),
    foisAdmissao:g('#fc-foisAdm'), dietaAdmissao:g('#fc-dietaAdm'),
    vaaInicio:g('#fc-vaaIni'), vaaConclusao:g('#fc-vaaFim'), vaaJustificativa:g('#fc-vaaJust'),
    decanulacaoProtocolo:g('#fc-decProt'), decanulacaoAvaliacao:g('#fc-decAval'),
    decanulacaoData:g('#fc-decData'), altaFono:g('#fc-altaFono'), obs:g('#fc-obs')
  };
}

/* ---------- ficha do paciente ---------- */
function abrirFicha(epId){
  gs('getFicha',S.token,epId).then(function(r){
    if(!r.ok){ toast(r.erro); return; }
    const e=r.episodio,p=r.paciente;
    const sv=servico(e.servicoId)||{}; const st=setor(e.setorId)||{};
    const ativo=e.status==='ATIVO';
    openModal(mHead(p.nome||'Paciente')+
    '<div class="modal-b">'+
      '<div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px">'+
        '<span class="tag">Pront. '+esc(p.prontuario)+'</span>'+
        '<span class="tag">'+esc(p.sexo||'—')+'</span>'+
        (p.dataNascimento?'<span class="tag">Nasc. '+fmtD(p.dataNascimento)+'</span>':'')+
        '<span class="tag">'+esc(sv.nome||'')+' · '+esc(st.nome||'')+(e.leito?' · leito '+esc(e.leito):'')+'</span>'+
        (ativo?'<span class="pill ok">ativo</span>':'<span class="pill pn">encerrado em '+fmtD(e.dataSaida)+'</span>')+
      '</div>'+
      '<div class="tabs"><button class="active" data-t="atd">Atendimentos ('+r.atendimentos.length+')</button>'+
      '<button data-t="cli">Dados clínicos</button></div>'+
      '<div id="fx-atd">'+
        (ativo?'<button class="btn sm" id="fx-add" style="margin-bottom:12px">+ Registrar atendimento</button>':'')+
        '<div class="tl">'+(r.atendimentos.length?r.atendimentos.map(function(a){
          const procs=String(a.procedimentos||'').split(' | ').filter(function(x){return x;});
          return '<div class="tl-item"><div class="d">'+fmtD(a.data)+
            '<small>'+esc(a.profissional)+(truthy(a.extra)?' · extra':'')+'</small></div>'+
            '<div><div>'+procs.map(function(pr){return '<span class="tag">'+esc(pr)+'</span>';}).join('')+'</div>'+
            (a.obs?'<div class="obs">'+esc(a.obs)+'</div>':'')+'</div>'+
            '<button class="btn xs danger" data-del="'+a.id+'">excluir</button></div>';
        }).join(''):'<div class="empty">Nenhum atendimento registrado.</div>')+'</div>'+
      '</div>'+
      '<div id="fx-cli" class="hidden">'+formClinico(sv.tipo||'ADULTO',e)+
        '<div style="margin-top:12px;text-align:right"><button class="btn" id="fx-savecli">Salvar dados clínicos</button></div>'+
      '</div>'+
    '</div>'+
    '<div class="modal-f">'+
      (ativo?'<button class="btn danger" id="fx-enc">Encerrar / alta</button>':
             '<button class="btn ghost" id="fx-reabrir">Reabrir</button>')+
      '<button class="btn ghost" onclick="closeModal()">Fechar</button>'+
    '</div>',true);

    const ovl=$('#ovl');
    $$('.tabs button',ovl).forEach(function(b){
      b.addEventListener('click',function(){
        $$('.tabs button',ovl).forEach(function(x){x.classList.remove('active');});
        b.classList.add('active');
        $('#fx-atd').classList.toggle('hidden',b.dataset.t!=='atd');
        $('#fx-cli').classList.toggle('hidden',b.dataset.t!=='cli');
      });
    });
    if($('#fx-add')) $('#fx-add').addEventListener('click',function(){ modalAtendimento(e,sv.tipo); });
    $$('[data-del]').forEach(function(b){
      b.addEventListener('click',function(){
        if(!confirm('Excluir este atendimento?')) return;
        gs('excluirAtendimento',S.token,b.dataset.del).then(function(){ abrirFicha(epId); });
      });
    });
    $('#fx-savecli').addEventListener('click',function(){
      const obj=coletaClinico(); obj.id=e.id;
      gs('saveEpisodio',S.token,obj).then(function(r2){
        if(r2.ok){ toast('Dados salvos.'); closeModal(); loadCensoSafe(); }
      });
    });
    if($('#fx-enc')) $('#fx-enc').addEventListener('click',function(){ modalEncerrar(e,sv.tipo); });
    if($('#fx-reabrir')) $('#fx-reabrir').addEventListener('click',function(){
      gs('reabrirEpisodio',S.token,e.id).then(function(){ toast('Reaberto.'); closeModal(); loadCensoSafe(); });
    });
  });
}
function loadCensoSafe(){ if(S.view==='censo') loadCenso(); }

function modalAtendimento(e,tipo){
  openModal(mHead('Registrar atendimento')+
  '<div class="modal-b">'+
    '<div class="frm">'+
      '<div class="field"><label>Data</label><input type="date" id="at-data" value="'+hoje()+'"></div>'+
      '<div class="field"><label>Profissional</label><select id="at-prof">'+
        opts(S.dados.fonos.length?S.dados.fonos:[S.user.nome],S.user.nome)+'</select></div>'+
      '<div class="field full"><label>Procedimentos realizados</label>'+
        chips('procs',lista('PROCEDIMENTO',tipo))+'</div>'+
      '<div class="field"><label>Atendimento extra / à tarde?</label><select id="at-extra">'+
        '<option value="">Não</option><option value="1">Sim</option></select></div>'+
      '<div class="field full"><label>Observações</label><textarea id="at-obs"></textarea></div>'+
    '</div>'+
  '</div>'+
  '<div class="modal-f"><button class="btn ghost" id="at-cancel">Cancelar</button>'+
  '<button class="btn" id="at-save">Registrar</button></div>');
  bindChips(document);
  $('#at-cancel').addEventListener('click',function(){ abrirFicha(e.id); });
  $('#at-save').addEventListener('click',function(){
    const procs=chipsVal('procs');
    if(!procs.length){ toast('Selecione ao menos um procedimento.'); return; }
    this.disabled=true;
    gs('registrarAtendimento',S.token,{episodioId:e.id,data:$('#at-data').value,
      procedimentos:procs,profissional:$('#at-prof').value,
      extra:!!$('#at-extra').value,obs:$('#at-obs').value}).then(function(r){
      if(r.ok){ toast('Atendimento registrado.'); abrirFicha(e.id); }
    });
  });
}

function modalEncerrar(e,tipo){
  openModal(mHead('Encerrar acompanhamento')+
  '<div class="modal-b"><div class="frm">'+
    '<div class="field"><label>Data da saída</label><input type="date" id="en-data" value="'+hoje()+'"></div>'+
    '<div class="field"><label>Dieta da alta / permanência</label><select id="en-dieta">'+
      opts(lista('DIETA_SAIDA',tipo),e.dietaSaida)+'</select></div>'+
    (tipo!=='INFANTIL'?'<div class="field full"><label>FOIS na alta / transferência</label><select id="en-fois">'+
      opts(lista('FOIS',tipo),e.foisAlta)+'</select></div>':'')+
  '</div></div>'+
  '<div class="modal-f"><button class="btn ghost" id="en-cancel">Voltar</button>'+
  '<button class="btn" id="en-save">Encerrar</button></div>');
  $('#en-cancel').addEventListener('click',function(){ abrirFicha(e.id); });
  $('#en-save').addEventListener('click',function(){
    gs('encerrarEpisodio',S.token,{id:e.id,dataSaida:$('#en-data').value,
      dietaSaida:$('#en-dieta').value,foisAlta:$('#en-fois')?$('#en-fois').value:undefined}).then(function(r){
      if(r.ok){ toast('Acompanhamento encerrado.'); closeModal(); loadCensoSafe(); }
    });
  });
}

/* ========================= PACIENTES ========================= */
function vPacientes(){
  $('#main').innerHTML=
  '<div class="topbar"><div><h2>Cadastro de pacientes</h2>'+
  '<div class="sub">Base única de pacientes do serviço</div></div>'+
  '<div class="tools"><input class="search" id="pc-q" placeholder="Buscar nome ou prontuário…">'+
  '<button class="btn" id="pc-add">+ Novo paciente</button></div></div><div id="pc-body"></div>';
  let t; $('#pc-q').addEventListener('input',function(){ clearTimeout(t); const v=this.value;
    t=setTimeout(function(){ loadPacientes(v); },350); });
  $('#pc-add').addEventListener('click',function(){ modalPaciente(null,function(){ loadPacientes($('#pc-q').value); }); });
  loadPacientes('');
}
function loadPacientes(q){
  $('#pc-body').innerHTML='<div class="loading"><div><div class="spin"></div>Carregando…</div></div>';
  gs('listPacientes',S.token,q).then(function(r){
    if(!r.pacientes.length){
      $('#pc-body').innerHTML='<div class="card"><div class="empty"><b>Nenhum paciente</b>Cadastre o primeiro paciente.</div></div>';
      return;
    }
    $('#pc-body').innerHTML='<div class="card tbl-wrap max"><table><thead><tr>'+
      '<th>Nome</th><th>Prontuário</th><th>Sexo</th><th>Nascimento</th><th></th></tr></thead><tbody>'+
      r.pacientes.map(function(p){
        return '<tr><td><b>'+esc(p.nome)+'</b></td><td class="num">'+esc(p.prontuario)+'</td>'+
        '<td>'+esc(p.sexo)+'</td><td>'+fmtD(p.dataNascimento)+'</td>'+
        '<td class="r"><button class="btn xs ghost" data-ed="'+p.id+'">editar</button></td></tr>';
      }).join('')+'</tbody></table></div>';
    $$('#pc-body [data-ed]').forEach(function(b){
      b.addEventListener('click',function(){
        const p=r.pacientes.filter(function(x){return String(x.id)===b.dataset.ed;})[0];
        modalPaciente(p,function(){ loadPacientes($('#pc-q').value); });
      });
    });
  });
}
function modalPaciente(p,cb){
  p=p||{};
  openModal(mHead(p.id?'Editar paciente':'Novo paciente')+
  '<div class="modal-b"><div class="frm">'+
    '<div class="field full"><label>Nome completo</label><input id="np-nome" value="'+esc(p.nome||'')+'"></div>'+
    '<div class="field"><label>Prontuário</label><input id="np-pront" value="'+esc(p.prontuario||'')+'"></div>'+
    '<div class="field"><label>Sexo</label><select id="np-sexo">'+opts(['F','M'],p.sexo)+'</select></div>'+
    '<div class="field"><label>Data de nascimento</label><input type="date" id="np-nasc" value="'+esc(String(p.dataNascimento||'').slice(0,10))+'"></div>'+
  '</div></div>'+
  '<div class="modal-f"><button class="btn ghost" onclick="closeModal()">Cancelar</button>'+
  '<button class="btn" id="np-save">Salvar</button></div>');
  $('#np-save').addEventListener('click',function(){
    const nome=$('#np-nome').value.trim(),pront=$('#np-pront').value.trim();
    if(!nome||!pront){ toast('Informe nome e prontuário.'); return; }
    this.disabled=true;
    gs('savePaciente',S.token,{id:p.id,nome:nome,prontuario:pront,
      sexo:$('#np-sexo').value,dataNascimento:$('#np-nasc').value}).then(function(r){
      if(r.ok){ toast('Paciente salvo.'); closeModal(); if(cb) cb(r.id,nome.toUpperCase()); }
    });
  });
}

/* ========================= TRIAGEM NEONATAL ========================= */
const TRIAGEM_TABS=[
  {id:'ORELHINHA',t:'Teste da Orelhinha'},
  {id:'LINGUINHA',t:'Teste da Linguinha'},
  {id:'RETORNO_ORELHINHA',t:'Retorno · Orelhinha'},
  {id:'RETORNO_LINGUINHA',t:'Retorno · Linguinha'},
  {id:'PENDENTES',t:'Pendências'}
];
const TRI={tab:'ORELHINHA',q:''};

function vTriagem(){
  $('#main').innerHTML=
  '<div class="topbar"><div><h2>Triagem neonatal</h2>'+
  '<div class="sub">Testes da orelhinha e da linguinha, retornos e pendências de reteste</div></div>'+
  '<div class="tools"><input class="search" id="tr-q" placeholder="Buscar nome ou prontuário…">'+
  '<button class="btn" id="tr-add">+ Novo registro</button></div></div>'+
  '<div class="tabs" id="tr-tabs">'+TRIAGEM_TABS.map(function(t){
    return '<button data-t="'+t.id+'" class="'+(TRI.tab===t.id?'active':'')+'">'+t.t+'</button>';}).join('')+'</div>'+
  '<div id="tr-body"></div>';
  $$('#tr-tabs button').forEach(function(b){
    b.addEventListener('click',function(){ TRI.tab=b.dataset.t;
      $$('#tr-tabs button').forEach(function(x){x.classList.toggle('active',x===b);}); loadTriagem(); });
  });
  let t; $('#tr-q').addEventListener('input',function(){ clearTimeout(t); const v=this.value;
    t=setTimeout(function(){ TRI.q=v; loadTriagem(); },350); });
  $('#tr-add').addEventListener('click',function(){
    modalTriagem(TRI.tab==='PENDENTES'?'ORELHINHA':TRI.tab,null);
  });
  loadTriagem();
}

function resultPill(r){
  const s=String(r||'').toUpperCase();
  if(!s) return '—';
  if(s==='PASSOU'||s==='NORMAL') return '<span class="pill ok">'+esc(r)+'</span>';
  if(s==='FALHOU'||s==='ALTERADO') return '<span class="pill bad">'+esc(r)+'</span>';
  return '<span class="pill warn">'+esc(r)+'</span>';
}

function loadTriagem(){
  $('#tr-body').innerHTML='<div class="loading"><div><div class="spin"></div>Carregando…</div></div>';
  const f=TRI.tab==='PENDENTES'?{pendentes:true,q:TRI.q||null}:{tipo:TRI.tab,q:TRI.q||null};
  gs('listTriagens',S.token,f).then(function(r){
    if(!r.triagens.length){
      $('#tr-body').innerHTML='<div class="card"><div class="empty"><b>Nenhum registro</b>'+
        (TRI.tab==='PENDENTES'?'Nenhuma pendência de reteste ou encaminhamento. 🎉':'Registre o primeiro exame.')+'</div></div>';
      return;
    }
    const pend=TRI.tab==='PENDENTES';
    $('#tr-body').innerHTML='<div class="card tbl-wrap max"><table><thead><tr>'+
      '<th>RN / paciente</th><th>Pront.</th>'+(pend?'<th>Teste</th>':'')+'<th>Data do exame</th>'+
      '<th>Resultado</th><th>Encaminhamentos</th><th>Profissional</th><th></th></tr></thead><tbody>'+
      r.triagens.map(function(t){
        const enc=[];
        if(String(t.encReteste).toUpperCase()==='SIM') enc.push('RETESTE');
        if(String(t.encBera).toUpperCase()==='SIM') enc.push('BERA');
        if(String(t.encFrenotomia).toUpperCase()==='SIM') enc.push('FRENOTOMIA');
        return '<tr><td><b>'+esc(t.nome)+'</b></td><td class="num">'+esc(t.prontuario)+'</td>'+
          (pend?'<td>'+esc(String(t.tipo).replace('_',' '))+'</td>':'')+
          '<td>'+fmtD(t.dataExame)+'</td><td>'+resultPill(t.resultado)+'</td>'+
          '<td>'+(enc.length?enc.map(function(x){return '<span class="pill warn">'+x+'</span> ';}).join(''):'—')+'</td>'+
          '<td>'+esc(t.profissional||'')+'</td>'+
          '<td class="r"><button class="btn xs ghost" data-ed="'+t.id+'">editar</button>'+
          (pend?' <button class="btn xs" data-ret="'+t.id+'">registrar retorno</button>':'')+'</td></tr>';
      }).join('')+'</tbody></table></div>';
    $$('#tr-body [data-ed]').forEach(function(b){
      b.addEventListener('click',function(){
        const t=r.triagens.filter(function(x){return String(x.id)===b.dataset.ed;})[0];
        modalTriagem(t.tipo,t);
      });
    });
    $$('#tr-body [data-ret]').forEach(function(b){
      b.addEventListener('click',function(){
        const t=r.triagens.filter(function(x){return String(x.id)===b.dataset.ret;})[0];
        modalTriagem('RETORNO_'+t.tipo,{nome:t.nome,prontuario:t.prontuario,sexo:t.sexo,
          dataNascimento:t.dataNascimento,leito:t.leito});
      });
    });
  });
}

function modalTriagem(tipo,t){
  t=t||{};
  const ehOre=tipo.indexOf('ORELHINHA')>=0;
  const ehRet=tipo.indexOf('RETORNO')===0;
  const titulo=TRIAGEM_TABS.filter(function(x){return x.id===tipo;})[0];
  const catRes=ehOre?'RESULTADO_ORELHINHA':'RESULTADO_LINGUINHA';
  const catProc=ehOre?'PROC_ORELHINHA':'PROC_LINGUINHA';
  const procsSel=String(t.procedimentos||'').split(' | ').filter(function(x){return x;});
  const frSel=String(t.fatoresRisco||'').split(' | ').filter(function(x){return x;});
  const F=function(lab,inner,full){ return '<div class="field'+(full?' full':'')+'"><label>'+lab+'</label>'+inner+'</div>'; };
  let h='<div class="frm">';
  h+=F('Nome do RN / paciente','<input id="tg-nome" value="'+esc(t.nome||'')+'">');
  h+=F('Prontuário','<input id="tg-pront" value="'+esc(t.prontuario||'')+'">');
  h+=F('Sexo','<select id="tg-sexo">'+opts(['F','M'],t.sexo)+'</select>');
  h+=F('Data de nascimento','<input type="date" id="tg-nasc" value="'+esc(String(t.dataNascimento||'').slice(0,10))+'">');
  h+=F('Leito','<input id="tg-leito" value="'+esc(t.leito||'')+'">');
  h+=F('Data do exame','<input type="date" id="tg-data" value="'+esc(String(t.dataExame||'').slice(0,10)||hoje())+'">');
  h+=F('Resultado do teste','<select id="tg-res">'+opts(lista(catRes),t.resultado)+'</select>');
  if(ehOre&&ehRet) h+=F('Resultado do BERA','<select id="tg-bera">'+opts(lista('RESULTADO_BERA'),t.resultadoBera)+'</select>');
  if(!ehRet){
    if(ehOre){
      h+=F('Encaminhado p/ reteste','<select id="tg-encReteste">'+opts(['SIM','NÃO'],t.encReteste)+'</select>');
      h+=F('Encaminhado p/ BERA','<select id="tg-encBera">'+opts(['SIM','NÃO'],t.encBera)+'</select>');
      h+=F('Fatores de risco',chips('frisco',lista('FATOR_RISCO'),frSel),true);
    }else{
      h+=F('Encaminhado p/ reteste','<select id="tg-encReteste">'+opts(['SIM','NÃO'],t.encReteste)+'</select>');
      h+=F('Encaminhado p/ frenotomia','<select id="tg-encFrenotomia">'+opts(['SIM','NÃO'],t.encFrenotomia)+'</select>');
      h+=F('Frenotomia no hospital?','<select id="tg-frenHosp">'+opts(['SIM','NÃO'],t.frenotomiaHospital)+'</select>');
    }
  }else{
    if(ehOre){
      h+=F('Encaminhado p/ BERA diagnóstico','<select id="tg-encBera">'+opts(['SIM','NÃO'],t.encBera)+'</select>');
    }else{
      h+=F('Necessita acompanhamento?','<select id="tg-acomp">'+opts(['SIM','NÃO'],t.necessidadeAcompanhamento)+'</select>');
      h+=F('Conduta','<input id="tg-conduta" value="'+esc(t.conduta||'')+'">');
      h+=F('Local da frenotomia','<select id="tg-localFren">'+opts(lista('LOCAL_FRENOTOMIA'),t.localFrenotomia)+'</select>');
    }
  }
  h+=F('Procedimentos realizados',chips('tproc',lista(catProc),procsSel),true);
  h+=F('Profissional','<select id="tg-prof">'+opts(S.dados.fonos.length?S.dados.fonos:[S.user.nome],t.profissional||S.user.nome)+'</select>');
  h+='</div>';
  openModal(mHead((t.id?'Editar — ':'Novo — ')+(titulo?titulo.t:tipo))+
    '<div class="modal-b">'+h+'</div>'+
    '<div class="modal-f">'+
    (t.id&&isGestor()?'<button class="btn danger" id="tg-del">Excluir</button>':'')+
    '<button class="btn ghost" onclick="closeModal()">Cancelar</button>'+
    '<button class="btn" id="tg-save">Salvar</button></div>',true);
  bindChips(document);
  $('#tg-save').addEventListener('click',function(){
    const g=function(id){ const el=$(id); return el?el.value:undefined; };
    const nome=$('#tg-nome').value.trim();
    if(!nome){ toast('Informe o nome.'); return; }
    this.disabled=true;
    gs('saveTriagem',S.token,{id:t.id,tipo:tipo,nome:nome,prontuario:$('#tg-pront').value,
      sexo:$('#tg-sexo').value,dataNascimento:$('#tg-nasc').value,leito:$('#tg-leito').value,
      dataExame:$('#tg-data').value,resultado:$('#tg-res').value,resultadoBera:g('#tg-bera'),
      encReteste:g('#tg-encReteste'),encBera:g('#tg-encBera'),encFrenotomia:g('#tg-encFrenotomia'),
      frenotomiaHospital:g('#tg-frenHosp'),necessidadeAcompanhamento:g('#tg-acomp'),
      conduta:g('#tg-conduta'),localFrenotomia:g('#tg-localFren'),
      fatoresRisco:chipsVal('frisco'),procedimentos:chipsVal('tproc'),
      profissional:$('#tg-prof').value}).then(function(r){
      if(r.ok){ toast('Registro salvo.'); closeModal(); loadTriagem(); }
    });
  });
  if($('#tg-del')) $('#tg-del').addEventListener('click',function(){
    if(!confirm('Excluir este registro?')) return;
    gs('excluirTriagem',S.token,t.id).then(function(){ toast('Excluído.'); closeModal(); loadTriagem(); });
  });
}

  loadReunioes();
}
function loadReunioes(){
  $('#re-body').innerHTML='<div class="loading"><div><div class="spin"></div>Carregando…</div></div>';
  gs('listReunioes',S.token).then(function(r){
    if(!r.reunioes.length){
      $('#re-body').innerHTML='<div class="card"><div class="empty"><b>Nenhuma reunião registrada</b></div></div>';
      return;
    }
    $('#re-body').innerHTML='<div class="card tbl-wrap max"><table><thead><tr>'+
      '<th>Data</th><th>Setor / local</th><th>Fonoaudiólogo</th><th class="r">Participantes</th><th>Pauta</th><th></th>'+

  });

function modalReuniao(x){
  x=x||{};
  const nomesSetores=setores(null).map(function(s){return s.nome;});
  openModal(mHead(x.id?'Editar reunião':'Nova reunião')+
  '<div class="modal-b"><div class="frm">'+

    const secoes=[
      {k:'idade',t:'Faixa etária'},

    ];

      fmtD(r.periodo.de)+' – '+fmtD(r.periodo.ate)+'</div>'+
    secoes.map(function(s){ return matrizHTML(s.t,r.setores,r.matrizes[s.k]); }).join('');
  });

function matrizHTML(titulo,cols,m){
  const linhas=m.linhas.filter(function(l){ return l.total>0; });
  if(!linhas.length) return '';
  const max=Math.max.apply(null,linhas.map(function(l){
    return Math.max.apply(null,l.valores.concat([1])); }));
  const heat=function(v){
    if(!v) return '';
    const a=Math.min(.34,.06+(v/max)*.28);
    return ' style="background:rgba(42,120,214,'+a.toFixed(2)+')"';
  };
  const totG=linhas.reduce(function(s,l){return s+l.total;},0);
  return '<div class="card" style="margin-bottom:14px"><div class="panel" style="padding-bottom:0"><h3>'+esc(titulo)+'</h3></div>'+
  '<div class="tbl-wrap"><table class="matrix"><thead><tr><th class="rot"></th>'+
    cols.map(function(c){return '<th class="r">'+esc(c.nome)+'</th>';}).join('')+
    '<th class="tot">Total</th></tr></thead><tbody>'+
    linhas.map(function(l){
      return '<tr><td class="rot" title="'+esc(l.rotulo)+'">'+esc(l.rotulo)+'</td>'+
        l.valores.map(function(v){return '<td class="heat"'+heat(v)+'>'+(v||'')+'</td>';}).join('')+
        '<td class="tot num">'+l.total+'</td></tr>';
    }).join('')+
    '<tr class="foot"><td>Total</td>'+m.totais.map(function(v){
      return '<td class="heat" style="text-align:right">'+(v||'')+'</td>';}).join('')+
    '<td class="tot num">'+totG+'</td></tr>'+
  '</tbody></table></div></div>';
}

function exportCSV(){
  if(!CONS_DATA||!CONS_DATA.setores.length){ toast('Aplique um período com dados primeiro.'); return; }
  const r=CONS_DATA;
  const linhas=[];
  const push=function(arr){ linhas.push(arr.map(function(c){
    c=String(c==null?'':c); return /[";\n]/.test(c)?'"'+c.replace(/"/g,'""')+'"':c; }).join(';')); };
  push(['CONSOLIDADO',fmtD(r.periodo.de)+' a '+fmtD(r.periodo.ate)]);
  const secoes={idade:'FAIXA ETÁRIA',sexo:'SEXO',perfil:'PERFIL',foisAdmissao:'FOIS ADMISSÃO',
    foisAlta:'FOIS ALTA',dietaSaida:'CONSISTÊNCIA DA ALTA'};
  Object.keys(secoes).forEach(function(k){
    push([]); push([secoes[k]].concat(r.setores.map(function(c){return c.nome;})).concat(['TOTAL']));
    r.matrizes[k].linhas.forEach(function(l){
      if(!l.total) return;
      push([l.rotulo].concat(l.valores).concat([l.total]));
    });
  });
  const blob=new Blob(['﻿'+linhas.join('\n')],{type:'text/csv;charset=utf-8'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='consolidado_'+(r.periodo.de||'inicio')+'_'+(r.periodo.ate||'fim')+'.csv';
  a.click();
}

      if(r.ok){ toast('Usuário salvo.'); closeModal(); cfgUsuarios();
        gs('apiBootstrap',S.token).then(function(b){ S.dados=b.dados; });
      } else toast(r.erro||'Erro ao salvar.');
    });
  });
}

/* ========================= INIT ========================= */
(function(){
  let tk=null;
  try{ tk=sessionStorage.getItem('fa_token'); }catch(e){}
  if(tk){
    S.token=tk;
    gs('apiBootstrap',tk).then(function(r){
      S.user=r.user; S.dados=r.dados; renderShell(); go('dashboard');
    }).catch(function(){ renderLogin(); });
  } else renderLogin();
})();
</script>
